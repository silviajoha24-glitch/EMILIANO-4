<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Fotomatón Emiliano #4 💙</title>

<style>

body{

margin:0;

background:#000;

display:flex;

flex-direction:column;

align-items:center;

justify-content:center;

min-height:100vh;

font-family:Arial,sans-serif;

padding:10px;

}

#contenedor{

position:relative;

width:95vw;

max-width:500px;

aspect-ratio:9/16;

overflow:hidden;

}

#foto{

position:absolute;

/* AJUSTE DEL ÁREA INTERNA */

top:14%;

left:18%;

width:64%;

height:63%;

object-fit:cover;

z-index:1;

}

#marco{

position:absolute;

top:0;

left:0;

width:100%;

height:100%;

object-fit:contain;

z-index:2;

pointer-events:none;

}

#subir,

#guardar{

width:260px;

padding:14px;

margin-top:15px;

font-size:18px;

border:none;

border-radius:15px;

}

#guardar{

background:#0d6efd;

color:white;

}

</style>

</head>

<body>

<div id="contenedor">

<img id="foto">

<img id="marco" src="Marco de fiesta Sonic (2).png">

</div>

<input id="subir" type="file" accept="image/*">

<button id="guardar">

📸 Guardar foto

</button>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<script>

document.getElementById("subir")

.addEventListener("change",function(e){

const archivo=e.target.files[0];

if(!archivo) return;

const lector=new FileReader();

lector.onload=function(evento){

document.getElementById("foto").src=

evento.target.result;

}

lector.readAsDataURL(archivo);

});

document.getElementById("guardar")

.addEventListener("click",function(){

html2canvas(

document.getElementById("contenedor")

).then(function(canvas){

const enlace=

document.createElement("a");

enlace.download=

"Cumple_Emiliano_4.png";

enlace.href=

canvas.toDataURL("image/png");

enlace.click();

});

});

</script>

</body>

</html>
