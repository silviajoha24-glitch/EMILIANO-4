<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
background:#000;
display:flex;
flex-direction:column;
align-items:center;
}

#contenedor{
position:relative;
width:430px;
height:760px;
}

#foto{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:1;
border:5px solid red;
}

#marco{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
z-index:2;
pointer-events:none;
}

</style>

</head>

<body>

<div id="contenedor">

<img id="foto">

<img id="marco" src="Marco de fiesta Sonic (2).png">

</div>

<input id="subir" type="file" accept="image/*">

<script>

document.getElementById("subir").addEventListener("change", function(e){

const archivo = e.target.files[0];

if(!archivo) return;

document.getElementById("foto").src =
URL.createObjectURL(archivo);

});

</script>

</body>

</html>
