<!DOCTYPE html>
<html>

<head>

<title>Fotomatón Emiliano #4 💙</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
background:#000;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
min-height:100vh;
}

#contenedor{
position:relative;
width:100%;
max-width:430px;
height:760px;
overflow:hidden;
}

#foto{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:10;
}

#marco{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
z-index:20;
pointer-events:none;
}

#subir{
margin-top:15px;
font-size:18px;
padding:12px;
}

#descargar{
margin-top:10px;
font-size:18px;
padding:12px 20px;
cursor:pointer;
}

</style>

</head>

<body>

<div id="contenedor">

<img id="foto">

<img id="marco" src="Marco de fiesta Sonic (2).png">

</div>

<input id="subir" type="file" accept="image/*">

<button id="descargar">📸 Guardar mi foto</button>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<script>

document.getElementById("subir").addEventListener("change", function(e){

const archivo = e.target.files[0];

if(!archivo) return;

const lector = new FileReader();

lector.onload = function(evento){

document.getElementById("foto").src = evento.target.result;

}

lector.readAsDataURL(archivo);

});

document.getElementById("descargar").addEventListener("click", function(){

html2canvas(document.getElementById("contenedor")).then(canvas => {

const enlace = document.createElement("a");

enlace.download = "Fotomaton_Emiliano_4.png";

enlace.href = canvas.toDataURL("image/png");

enlace.click();

});

});

</script>

</body>

</html>
