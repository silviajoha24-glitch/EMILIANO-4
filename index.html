<!DOCTYPE html>
<html>

<head>

<title>Fotomatón Emiliano #4 💙</title>

<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<style>

body{
margin:0;
background:#000;
display:flex;
flex-direction:column;
align-items:center;
min-height:100vh;
font-family:Arial,sans-serif;
overflow:hidden;
}

#contenedor{
position:relative;
width:95vw;
max-width:500px;
height:88vh;
overflow:hidden;
touch-action:none;
}

#foto{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:1;

transform:translate(0px,0px) scale(1);

transform-origin:center;

}

#marco{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
object-fit:contain;
z-index:2;
pointer-events:none;
}

#subir,
#guardar{

margin-top:10px;
padding:12px 20px;
font-size:18px;
border:none;
border-radius:12px;
cursor:pointer;

}

#guardar{
background:#0d6efd;
color:white;
}

</style>

</head>

<body>

<div id="contenedor">

<img id="foto">

<img id="marco" src="Marco de fiesta Sonic (2).png">

</div>

<input id="subir" type="file" accept="image/*">

<button id="guardar">Guardar foto</button>

<script>

const foto=document.getElementById("foto");

let posX=0;

let posY=0;

let escala=1;

let inicioX=0;

let inicioY=0;

let arrastrando=false;

document.getElementById("subir").addEventListener("change",function(e){

const archivo=e.target.files[0];

if(!archivo) return;

const lector=new FileReader();

lector.onload=function(evento){

foto.src=evento.target.result;

}

lector.readAsDataURL(archivo);

});

function actualizar(){

foto.style.transform=`translate(${posX}px,${posY}px) scale(${escala})`;

}

foto.addEventListener("touchstart",function(e){

if(e.touches.length===1){

arrastrando=true;

inicioX=e.touches[0].clientX-posX;

inicioY=e.touches[0].clientY-posY;

}

if(e.touches.length===2){

const dx=e.touches[0].clientX-e.touches[1].clientX;

const dy=e.touches[0].clientY-e.touches[1].clientY;

window.distanciaInicial=Math.sqrt(dx*dx+dy*dy);

window.escalaInicial=escala;

}

});

foto.addEventListener("touchmove",function(e){

e.preventDefault();

if(e.touches.length===1 && arrastrando){

posX=e.touches[0].clientX-inicioX;

posY=e.touches[0].clientY-inicioY;

actualizar();

}

if(e.touches.length===2){

const dx=e.touches[0].clientX-e.touches[1].clientX;

const dy=e.touches[0].clientY-e.touches[1].clientY;

const distancia=Math.sqrt(dx*dx+dy*dy);

escala=window.escalaInicial*(distancia/window.distanciaInicial);

actualizar();

}

});

foto.addEventListener("touchend",function(){

arrastrando=false;

});

document.getElementById("guardar").addEventListener("click",function(){

alert("Mantén presionada la imagen y guárdala desde Descargas.");

});

</script>

</body>

</html>
