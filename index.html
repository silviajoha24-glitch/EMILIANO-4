<!DOCTYPE html>
<html>

<head>

<title>Fotomatón Emiliano #4 💙</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
background:#000;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
min-height:100vh;
}

#contenedor{
position:relative;
width:100%;
max-width:430px;
}

#foto{
width:100%;
display:block;
}

#marco{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
}

#subir{
margin-top:20px;
font-size:18px;
padding:12px;
}

</style>

</head>

<body>

<div id="contenedor">

<img id="foto">

<img id="marco" src="Marco%20de%20fiesta%20Sonic%20(2).png">

</div>

<input id="subir" type="file" accept="image/*">

<script>

document.getElementById("subir").addEventListener("change", function(e){

const archivo = e.target.files[0];

if(!archivo) return;

document.getElementById("foto").src = URL.createObjectURL(archivo);

});

</script>

</body>

</html>
